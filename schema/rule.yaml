$id: https://networknt.com/schemas/rule/1.1.0/rule.yaml
$schema: https://json-schema.org/draft/2020-12/schema
description: Light-Rule / YAML-Rule Configuration Schema.
type: object
properties:
  ruleBodies:
    type: object
    title: RuleBodies
    description: A dictionary mapping rule IDs to their corresponding rule definitions.
    additionalProperties:
      $ref: '#/$defs/rule'
  endpointRules:
    type: object
    title: EndpointRules
    description: A dictionary mapping service endpoints to their required or applied rules.
    additionalProperties:
      $ref: '#/$defs/endpointConfig'
required: [ ruleBodies ]
additionalProperties: false

$defs:
  rule:
    type: object
    title: Rule
    description: A single rule containing conditions and actions.
    properties:
      ruleId:
        type: string
        title: RuleID
        description: The unique identifier for the rule (e.g., com.networknt.rule.0001). Must match the key in ruleBodies.
      ruleName:
        type: string
        title: RuleName
        description: Short human-readable name for selection lists and business users.
      ruleType:
        type: string
        title: RuleType
        description: Catalog type used to limit rule selection for different operations, such as access control, transformation, or validation.
      common:
        type: string
        enum: [ Y, N ]
        title: Common
        description: Whether this rule can be shared by other hosts. Y means shared; N means host-specific.
      ruleDesc:
        type: string
        title: RuleDesc
        description: A human-readable description of what this rule does.
      hostId:
        type: string
        title: HostId
        description: Optional host identifier for private or portal-managed rules. Common shared rules may omit it.
      version:
        type: string
        title: Version
        description: Optional version string for governance.
      author:
        type: string
        title: Author
        description: Optional author tracking.
      updatedAt:
        type: string
        format: date-time
        title: UpdatedAt
        description: Optional timestamp of the last update.
      conditions:
        type: array
        title: Conditions
        description: A list of logical conditions that must be met for the rule's actions to trigger.
        items:
          $ref: '#/$defs/condition'
      actions:
        type: array
        title: Actions
        description: A list of actions that execute if the conditions evaluate to true.
        items:
          $ref: '#/$defs/action'
    required: [ ruleId, ruleName, ruleType, common ]
    additionalProperties: false
    
  condition:
    type: object
    title: RuleCondition
    description: Describes an individual evaluation condition.
    properties:
      conditionId:
        type: string
        title: ConditionID
        description: An optional identifier for the condition.
      conditionDesc:
        type: string
        title: ConditionDesc
        description: Natural language condition description for business users and reviewers.
      operator:
        type: string
        enum: ["==", "!=", ">", "<", ">=", "<=", "eq", "ne", "contains", "matches", "startsWith", "endsWith", "exists", "notExists"]
        title: Operator
        description: The logical operator used to compare the operand to the expected value.
      operand:
        type: string
        title: Operand
        description: The data field, variable name, JSON Pointer, or JSONPath-like expression to evaluate against the input context.
      expected:
        type: [string, number, boolean, array, object, "null"]
        title: Expected
        description: The value that the operand is compared against.
      joinCode:
        type: string
        enum: [ AND, OR ]
        title: JoinCode
        description: Defines how this condition combines with the previous condition. Flat condition arrays are evaluated left-to-right with no implicit operator precedence; use multiple rules when explicit grouping is required.
    required: [ operator, operand ]
    additionalProperties: false

  action:
    type: object
    title: RuleAction
    description: Describes a plugin or custom logic to execute if conditions are met.
    properties:
      actionId:
        type: string
        title: ActionID
        description: An optional identifier for this action block.
      actionDesc:
        type: string
        title: ActionDesc
        description: Natural language action description for business users and reviewers.
      actionRef:
        type: string
        title: ActionRef
        description: Runtime-neutral action identifier resolved by the rule engine action registry. Java, Rust, and other runtimes map this reference to their local implementation.
      actionValues:
        type: object
        title: ActionValues
        description: Key-value parameters passed to the action plugin upon execution.
        additionalProperties: true
    required: [ actionRef ]
    additionalProperties: false

  endpointConfig:
    type: object
    title: EndpointConfig
    description: Describes the rule mapping structure for a given service endpoint. Custom extension phases are allowed only with an x- prefix.
    properties:
      req-tra:
        type: array
        items:
          type: string
        description: An array of rule IDs applied sequentially for request transformation.
      res-tra:
        type: array
        items:
          type: string
        description: An array of rule IDs applied sequentially for response transformation.
      access-control:
        type: array
        items:
          type: string
        description: An array of rule IDs applied in parallel for access control validation.
      permission:
        type: object
        description: Optional permission overrides injected into the evaluation context.
        additionalProperties: true
    patternProperties:
      "^x-[A-Za-z0-9._-]+$":
        type: array
        items:
          type: string
        description: Extension rule phase. Extension phase names must start with x-.
    additionalProperties: false
